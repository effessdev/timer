<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Timer</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card-hover:#334155;
    --accent:#38bdf8;
    --accent2:#22c55e;
    --danger:#ef4444;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Inter,Segoe UI,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#111827);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:min(900px,100%);
}

h1{
    text-align:center;
    font-size:2.4rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:35px;
}

.settings{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
}

.settings input{
    width:80px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    text-align:center;
    font-size:1rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:20px;
}

.timer{
    background:var(--card);
    border-radius:18px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    transition:.25s;
    user-select:none;
    border:1px solid rgba(255,255,255,.05);
}

.timer:hover{
    transform:translateY(-4px);
    background:var(--card-hover);
}

.timer.running{
    outline:3px solid var(--accent);
}

.timer h2{
    font-size:2.6rem;
}

.timer p{
    margin-top:10px;
    color:var(--muted);
}

.status{
    margin-top:35px;
    text-align:center;
    font-size:1.1rem;
    min-height:30px;
}

.big{
    font-size:4rem;
    margin-top:10px;
    font-weight:bold;
}

.controls{
    display:flex;
    justify-content:center;
    margin-top:30px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:var(--danger);
    color:white;
    font-size:1rem;
    transition:.2s;
}

button:hover{
    filter:brightness(1.1);
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🏋 Workout Timer</h1>
<div class="subtitle">
Click any timer to begin.
</div>

<div class="settings">
<label>Start Delay</label>
<input id="delayInput" type="number" value="3" min="0">
<span>seconds</span>
</div>

<div class="grid">

<div class="timer" data-time="15">
<h2>15</h2>
<p>seconds</p>
</div>

<div class="timer" data-time="30">
<h2>30</h2>
<p>seconds</p>
</div>

<div class="timer" data-time="45">
<h2>45</h2>
<p>seconds</p>
</div>

<div class="timer" data-time="60">
<h2>60</h2>
<p>seconds</p>
</div>

</div>

<div class="status">
<div id="message">Ready</div>
<div id="countdown" class="big"></div>
</div>

<div class="controls">
<button id="cancel" class="hidden">Cancel Timer</button>
</div>

</div>

<script>
const message=document.getElementById("message");
const countdown=document.getElementById("countdown");
const cancelBtn=document.getElementById("cancel");
const delayInput=document.getElementById("delayInput");

let timeout=null;
let interval=null;
let running=false;
let currentCard=null;
let audioCtx=null;

function beep(freq,duration,type="sine",volume=.2){

    if(!audioCtx)
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type=type;
    osc.frequency.value=freq;

    gain.gain.value=volume;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime+duration/1000
    );

    osc.stop(audioCtx.currentTime+duration/1000);
}

/* Pea whistle */
function startSound(){

    beep(1200,120,"square",0.3);

    setTimeout(()=>{
        beep(1500,120,"square",0.25);
    },90);

}

/* Finish sound */
function finishSound(){

    beep(800,180,"triangle",0.25);

    setTimeout(()=>{
        beep(600,350,"triangle",0.25);
    },170);

}

function clearEverything(){

    clearTimeout(timeout);
    clearInterval(interval);

    running=false;

    cancelBtn.classList.add("hidden");

    if(currentCard)
        currentCard.classList.remove("running");

    currentCard=null;

    countdown.textContent="";
}

function cancel(){

    clearEverything();
    message.textContent="Cancelled";

}

cancelBtn.onclick=cancel;

document.querySelectorAll(".timer").forEach(card=>{

card.onclick=()=>{

if(running) return;

running=true;

currentCard=card;
card.classList.add("running");
cancelBtn.classList.remove("hidden");

const delay=Math.max(0,Number(delayInput.value)||0);

let remain=delay;

message.textContent="Starting...";

countdown.textContent=remain;

interval=setInterval(()=>{

remain--;

if(remain>0)
    countdown.textContent=remain;

},1000);

timeout=setTimeout(()=>{

clearInterval(interval);

startSound();

let left=Number(card.dataset.time);

message.textContent="Workout!";
countdown.textContent=left;

interval=setInterval(()=>{

left--;

countdown.textContent=left;

if(left<=0){

clearInterval(interval);

finishSound();

message.textContent="Finished 🎉";

countdown.textContent="";

running=false;

card.classList.remove("running");

cancelBtn.classList.add("hidden");

}

},1000);

},delay*1000);

};

});
</script>

</body>
</html>
